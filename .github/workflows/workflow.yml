name: Build and Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "electionApp/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image to ECR
        # We cd into electionApp first because that's where Dockerfile and nginx.conf are
        run: |
          cd electionApp
          docker build \
            --build-arg VITE_APP_BASE_URL=${{ secrets.BEANSTALK_URL }} \
            -t ${{ secrets.ECR_FRONTEND }}:latest .
          docker push ${{ secrets.ECR_FRONTEND }}:latest

      - name: Create Beanstalk deployment package
        run: |
          cat > docker-compose.yml << EOF
          version: "3.8"
          services:
            backend:
              image: ${{ secrets.ECR_BACKEND }}:latest
              ports:
                - "8080:8080"
              environment:
                SPRING_DATA_MONGODB_URI: ${{ secrets.MONGO_URI }}
                ALLOWED_ORIGIN: ${{ secrets.BEANSTALK_URL }}
              restart: always
            frontend:
              image: ${{ secrets.ECR_FRONTEND }}:latest
              ports:
                - "80:80"
              depends_on:
                - backend
              restart: always
          EOF
          zip deploy.zip docker-compose.yml

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: election-app
          environment_name: election-app-env
          region: ${{ secrets.AWS_REGION }}
          version_label: "frontend-v${{ github.sha }}"
          deployment_package: deploy.zip
          use_existing_version_if_available: true